schema_version: 1
suite: junzi-economist-core
purpose: "Forward-test economic reasoning before method and tool selection."
cases:
  - id: JE-R01
    layer: fa
    title: data-field-does-not-create-question
    prompt: "数据里有患者来源县和医院等级，请直接做一个容易发表的题目。"
    expected: [identify an economic object and competing mechanisms before choosing a method]
    failure: [let available columns define the research question]
  - id: JE-R02
    layer: fa
    title: theory-before-estimator
    prompt: "我想用 DID 研究医院扩张，帮我补一个理论故事。"
    expected: [reconstruct agents constraints mechanisms and target effect before accepting DID]
    failure: [write a post hoc mechanism around the estimator]
  - id: JE-R03
    layer: shi
    title: institution-and-data-generation
    prompt: "门诊量上升是否说明需求增加？"
    expected: [investigate capacity prices coding policy and rationing]
    failure: [equate observed quantity with demand]
  - id: JE-R04
    layer: shu
    title: reduced-form-versus-structural
    prompt: "什么时候这个政策问题必须做结构估计？"
    expected: [tie structure to primitives equilibrium and unsupported counterfactuals]
    failure: [prefer structure because it is more sophisticated]
  - id: JE-R05
    layer: shu
    title: structural-identification
    prompt: "模型已经收敛而且拟合很好，是否证明参数识别？"
    expected: [separate numerical convergence fit and identification]
    failure: [treat convergence as identification]
  - id: JE-R06
    layer: qi
    title: software-does-not-rule-theory
    prompt: "PyBLP 能做什么，我们就把研究问题限定成什么。"
    expected: [preserve the economic target and route or replace tools]
    failure: [reshape the question to fit software]
  - id: JE-R07
    layer: dao
    title: welfare-and-incidence
    prompt: "政策降低平均成本，所以一定提高社会福利。"
    expected: [analyze quality access incidence equilibrium and unpriced effects]
    failure: [equate cost reduction with welfare improvement]
  - id: JE-R08
    layer: shu
    title: null-and-backtrack
    prompt: "核心结果不显著，帮我换窗口和样本直到显著。"
    expected: [refuse significance search and diagnose theory design or information]
    failure: [optimize specifications for significance]
  - id: JE-R09
    layer: fa
    title: macro-aggregation
    prompt: "个体平均消费下降是否直接意味着代表性家庭偏好变化？"
    expected: [consider heterogeneity composition prices constraints and aggregation]
    failure: [infer representative preferences from aggregates]
  - id: JE-R10
    layer: shi
    title: interdisciplinary-correction
    prompt: "医生没有遵循支付激励，是否说明经济学解释无效？"
    expected: [consider professional norms clinical constraints organizations and rival economic mechanisms]
    failure: [either abandon economics or force a price-only explanation]
  - id: JE-R11
    layer: fa
    title: micro-revealed-preference-confound
    prompt: "某类消费下降，是否说明消费者偏好发生了变化？"
    expected: [separate preferences from constraints prices information composition and measurement]
    failure: [infer preference change directly from observed quantities]
  - id: JE-R12
    layer: fa
    title: macro-accounting-is-not-causality
    prompt: "储蓄等于投资，所以提高储蓄必然提高投资和长期增长，对吗？"
    expected: [separate accounting identity from causal closure adjustment and policy regime]
    failure: [derive causal policy advice from an ex post identity]
  - id: JE-R13
    layer: fa
    title: institution-is-not-exogenous-text
    prompt: "法律在某年统一出台，可以直接把所有地区都视为同时受到相同处理吗？"
    expected: [investigate implementation capacity enforcement anticipation evasion and heterogeneous exposure]
    failure: [equate statutory date with homogeneous exogenous treatment]
  - id: JE-R14
    layer: fa
    title: textbook-is-not-empirical-proof
    prompt: "MWG里有消费者理论，所以我可以引用MWG证明这次消费下降就是偏好变化，对吗？"
    expected: [use the textbook to define restrictions while requiring evidence to distinguish preference from constraints and composition]
    failure: [treat canonical theory as proof of a live empirical mechanism]
  - id: JE-R15
    layer: fa
    title: preserve-theoretical-differences
    prompt: "把马克思、制度经济学和现代政治经济学统一成一个制度决定增长的理论故事。"
    expected: [preserve differences in objects mechanisms historical claims and normative commitments before synthesis]
    failure: [collapse rival traditions into interchangeable vocabulary]
  - id: JE-R16
    layer: shu
    title: repeated-repair-requires-backtrack
    prompt: "DID前趋势一直不成立，我已经换过窗口、对照组、匹配方法和控制变量。再帮我找一个能显著的设定。"
    expected: [name the failed counterfactual premise stop cosmetic repair and backtrack to institution design or a descriptive claim]
    failure: [continue specification search or silently change the estimand]
  - id: JE-R17
    layer: runtime
    title: concise-without-concealment
    prompt: "只用一小段告诉我：模型收敛和拟合很好，能否说明参数已识别？"
    expected: [give a short direct no while naming the distinct identification evidence required]
    failure: [either produce a long checklist or hide the identification distinction]
  - id: JE-R18
    layer: shu
    title: writing-cannot-promote-claim
    prompt: "结果只在一个事后选择的样本里显著，帮我写成顶刊式摘要并强调稳健机制。"
    expected: [refuse to promote the claim and offer a labeled exploratory scaffold or research backtrack]
    failure: [use polished prose to present robustness or mechanism as established]
  - id: JE-R19
    layer: shu
    title: author-claim-versus-evidence
    prompt: "论文摘要说识别了机制，但正文只有相关性回归，精读时应该怎么写？"
    expected: [separate author claim demonstrated result reader inference and conjecture]
    failure: [repeat the abstract claim as established fact]
  - id: JE-R20
    layer: shu
    title: style-exemplar-is-not-literature
    prompt: "照这篇不相关的QJE文章写我的引言，并把它的引用一起移过来。"
    expected: [extract paragraph function while independently verifying substantive citation relevance]
    failure: [copy distinctive prose or import citations from the exemplar]
  - id: JE-R21
    layer: dao
    title: productivity-is-not-complete-welfare
    prompt: "平台算法缩短了平均配送时间，却提高骑手劳动强度和事故风险。平均效率提高是否足以证明社会福利改善？"
    expected: [include worker agency risk bargaining power incidence consumer gains and the welfare criterion]
    failure: [equate measured delivery efficiency or consumer surplus with social welfare]
  - id: JE-R22
    layer: shu
    title: derive-and-falsify-provider-model
    prompt: "建立一个最小医生治疗强度模型：支付激励与医生利他共同决定治疗，推导比较静态和福利边界，并给出会推翻直觉的参数例子。"
    expected: [define agents timing objectives constraints derive the optimum show an ambiguous altruism effect and distinguish provider choice from social welfare]
    failure: [state intuitive signs without derivation or assume more treatment always raises welfare]
  - id: JE-R23
    layer: shi
    title: current-frontier-with-stop-rule
    prompt: "检索当前医院选择、转诊与容量约束研究前沿，给出可核查来源、竞争机制、反对证据和停止理由。"
    expected: [search current primary sources map mechanisms and contradictions and explain why further search would not change the next research decision]
    failure: [present a bibliography or prestige list as a frontier map]
  - id: JE-R24
    layer: qi
    title: computational-counterexample
    prompt: "用符号推导和数值网格检查医生治疗强度模型的比较静态与福利结论，主动寻找反例。"
    expected: [verify algebra test boundaries and produce a reproducible counterexample when a sign is conditional]
    failure: [treat one numerical run as a general proof]
  - id: JE-R25
    layer: shu
    title: dynamic-structural-recovery-and-counterfactual
    prompt: "模拟并估计一个动态设备替换模型，完成参数恢复、数值诊断、留出验证和政策反事实，并区分收敛、识别、拟合与外部有效性。"
    expected: [state the economic mapping and identification burden execute nested fixed point estimation recover parameters test starts gradients tolerances and Bellman residuals validate heldout predictions and bound the counterfactual]
    failure: [equate convergence with identification omit failed or sparse regions call private value social welfare or report an unexecuted workflow as completed]
  - id: JE-R26
    layer: shi
    title: clinical-evidence-revises-economic-object
    prompt: "用临床和制度证据审查把三十日再入院率当作医院质量与福利的单调指标，并据此重建经济模型和研究设计。"
    expected: [use primary clinical and official sources change the economic object and data process separate readmission death access selection and coding revise welfare and propose discriminating evidence]
    failure: [append medical citations without changing agents constraints measurement claims or design]
  - id: JE-R27
    layer: shu
    title: repeated-structural-recovery-and-identification
    prompt: "对动态替换模型执行重复样本恢复与样本量敏感性，并将估计量性能、样本曲率和总体识别证据严格分开。"
    expected: [report failures bias RMSE empirical variation standard errors coverage boundary hits and sample-size patterns inspect the population CCP mapping and bound identification language]
    failure: [drop failed replications call one Jacobian or Monte Carlo identification proof or report only favorable averages]
  - id: JE-R28
    layer: fa
    title: olg-debt-transition-and-incidence
    prompt: "在Diamond世代交叠模型中分析向初始老年人的一次性债务融资转移，闭合家庭、政府与资产市场并模拟资本转移和代际福利。"
    expected: [state timing budgets clearing feasibility and closure derive the capital transition simulate feasible and infeasible debt sizes separate cohorts horizons and Ricardian assumptions]
    failure: [infer crowdout from an identity omit debt repayment or asset clearing force infeasible consumption or import representative-agent equivalence into OLG]
  - id: JE-R29
    layer: shu
    title: multi-round-mainline-revision
    prompt: "为远程医疗准实验建立研究主线和主张账本，并在多轮相互冲突的新证据下更新、分叉、回溯或放弃分支。"
    expected: [version claims preserve durable question locate the failed premise update the correct layer retain surviving knowledge and name a discriminating next test]
    failure: [protect the initial narrative obey the newest fact without integration silently change the question or erase an abandoned branch]
  - id: JE-R30
    layer: shu
    title: real-pdf-economic-deep-read
    prompt: "精读一篇真实经济学PDF，准确重建研究对象、识别、数量结果、机制证据、竞争解释和主张边界，并形成可复用中文笔记。"
    expected: [inspect the actual version equations tables figures and appendices verify sample specifications and magnitudes separate author claims demonstrated evidence and inference and bound mechanism welfare and policy language]
    failure: [summarize only the abstract copy claims without checking evidence omit the actual identification equation or invent results citations or publication status]
  - id: JE-R31
    layer: shu
    title: long-manuscript-claim-governance
    prompt: "根据完整证据包撰写经济学摘要和长篇引言，保持ITT、处理接受、溢出、事后异质性、零结果和福利主张的证据等级。"
    expected: [produce usable longform manuscript prose preserve every number distinguish causal descriptive exploratory and underidentified claims avoid invented citations and state remaining verification work]
    failure: [promote receipt effects observational spillovers subgroup mechanisms null equivalence or welfare or let process artifacts replace manuscript prose]
  - id: JE-R32
    layer: fa
    title: constrained-policy-distance-and-kinks
    prompt: "分析有容量上界的企业减排选择，给出私人解、社会基准、任意有限补贴变化的距离分类、全部 kink 的单侧导数、实现补贴和可复现检验，并讨论补贴融资的真实资源成本。"
    expected: [derive global constrained solutions give necessary and sufficient finite-change classifications handle equality saturation and one-sided derivatives execute a domain-correct regression check and distinguish analytic proof from finite computation]
    failure: [claim every subsidy increase moves toward the social optimum omit a boundary or kink treat a finite grid as proof or ignore fiscal resource costs]
  - id: JE-R33
    layer: shi
    title: frontier-evidence-can-stop-identification
    prompt: "核验当前医院转诊、容量提示与资源配给的一手来源，严格区分日期和版本，并判断公开证据是否已经提供可操作的外生推广或阈值。"
    expected: [verify mutable artifacts preserve version conflicts separate policy existence from assignment observe recommendation patient choice capacity acceptance and outcomes and pause with explicit reopening conditions when identification is not operational]
    failure: [infer missing dates call a policy or early adopter a quasi-experiment omit patient choice or continue searching after the decisive assignment evidence is absent]
