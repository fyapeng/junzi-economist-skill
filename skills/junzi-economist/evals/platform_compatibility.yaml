schema_version: 1
audit_date: "2026-07-13"
shared_package:
  entrypoint: SKILL.md
  frontmatter: [name, description]
  supporting_directories: [references, assets, scripts]
codex:
  personal_install_path: "~/.codex/skills/junzi-economist"
  interface_metadata: agents/openai.yaml
  evidence:
    - official quick_validate.py passes
    - project validate.py passes
    - agents/openai.yaml parses
  status: structurally-validated
claude_code:
  personal_install_path: "~/.claude/skills/junzi-economist"
  project_install_path: ".claude/skills/junzi-economist"
  invocation: "/junzi-economist or automatic by description"
  evidence:
    - shared name is lowercase hyphenated and under 64 characters
    - description is under the documented 1536-character listing budget
    - SKILL.md is under 500 lines
    - supporting resources are referenced with relative paths
    - Claude-specific optional frontmatter is not required
  status: statically-compatible-runtime-untested
  limitation: "Claude CLI is not available in PATH on the audit machine."
distribution_rule: "Publish one package; install or copy the directory into the platform-specific skills folder. Do not maintain divergent SKILL.md copies."
official_documentation:
  claude_skills: "https://code.claude.com/docs/en/slash-commands"
