schema_version: 1
audit_date: "2026-07-13"
status_scale: [proved, partial, missing, contradicted]
requirements:
  junzi_root:
    status: proved
    evidence: [SKILL.md, references/HUMAN_WELFARE_AND_INSTITUTIONS.md, evals/executions/JE-X027, evals/executions/JE-X028, evals/executions/JE-X029, evals/executions/JE-X030, evals/executions/JE-X031, evals/executions/JE-X032, evals/executions/JE-X033]
    gap: "Seven adversarial executions now make agency, power, safety, due process, voice, rights constraints, and unresolved value conflict change feasible sets, welfare criteria, research design, and branch decisions across labor, education, housing, health, courts, scholarships, and childcare; JE-X033 is a clean dual-audited pass on exact commit b8f4611. Future breadth can test environmental and intergenerational conflicts."
  microeconomic_law:
    status: proved
    evidence: [references/MICROECONOMIC_LAW.md, evals/executions/JE-X034, evals/executions/JE-X035, evals/executions/JE-X036, evals/executions/JE-X037]
    gap: "Hidden-action contracts, limited liability, strict implementation and existence, production duality, fixed-cost entry, monopoly and social benchmarks, strategic complementarity, complete mixed-equilibrium correspondences, selection, and fiscal policy now pass. Future breadth can add adverse selection, auctions, bargaining, search, and general equilibrium."
  macroeconomic_law:
    status: proved
    evidence: [references/MACROECONOMIC_LAW.md, evals/executions/JE-X014, evals/executions/JE-X038, evals/executions/JE-X039, evals/executions/JE-X040, evals/executions/JE-X041, evals/executions/JE-X042, evals/executions/JE-X043]
    gap: "The preserved JE-X038 and JE-X039 failures generated exact-commit transfer rules. JE-X041 then passes monetary-fiscal dynamic closure, branch selection, tool bounds, and exact seigniorage boundaries; JE-X043 passes fresh heterogeneous-agent equilibrium with executable reliability, full root traces, genuine non-crossing screening, and isolated grid checks; JE-X040 passes open-economy risk, borrowing, sudden stops, and terminal closure. Future breadth can add nominal rigidity, labor search, banking, sovereign default, and growth with aggregate risk."
  institutions_and_frontier:
    status: proved
    evidence: [references/SITUATION_AND_FRONTIER.md, references/FRONTIER_SEARCH.md, evals/executions/JE-X008, evals/executions/JE-X010, evals/executions/JE-X026]
    gap: "JE-X026 independently reverified three mutable primary sources, preserved version conflicts, restored the full patient choice chain, rejected unverified rollout and threshold claims, and stopped at the assignment-evidence bottleneck; future breadth should cover non-health institutions."
  theory_modeling:
    status: proved
    evidence: [references/ECONOMIC_FOUNDATIONS.md, references/THEORY_MODELING.md, evals/executions/JE-X005, evals/executions/JE-X007, evals/executions/JE-X009, evals/executions/JE-X025]
    gap: "JE-X025 closes the prior endpoint with global constrained solutions, necessary-and-sufficient finite classifications, all one-sided kinks, an executed exact regression suite, fiscal-resource-cost extension, and explicit separation of analytic proof from finite computation; broaden later to strategic and stochastic models."
  causal_identification:
    status: proved
    evidence: [references/EMPIRICAL_AND_STRUCTURAL_METHODS.md, evals/runs/2026-07-13-round-04.md]
    gap: "Coverage now includes DID, common counterfactual failures, protected-choice ITTs, two-stage saturation designs, partial interference, displacement, total-policy effects, and finite-population support; broaden to networks, measurement error, and mediation."
  structural_estimation:
    status: partial
    evidence: [references/EMPIRICAL_AND_STRUCTURAL_METHODS.md, references/SOFTWARE_AND_COMPUTATION.md, evals/executions/JE-X044, evals/executions/JE-X045, evals/executions/JE-X046, evals/executions/JE-X053, evals/executions/JE-X058, evals/executions/JE-X059, evals/executions/JE-X061]
    gap: "Demand-supply equilibrium and latent-profile endpoints have clean exact-commit passes, while dynamic NFXP/CCP, estimated transitions, local rank, closed domains, generated policy interfaces, accounting, and projected gradients reproduce substantively across repeated audits. Round 17 showed that pursuing a formally perfect release package had become a secondary meta-verification branch. Retain partial without further dedicated verifier endpoints; future evidence should come from economically distinct structural applications, not recursive release auditing."
  computation_and_instruments:
    status: partial
    evidence: [references/SOFTWARE_AND_COMPUTATION.md, references/DATA_AND_MEASUREMENT.md, assets/templates/DATA_CONSTRUCTION_MAP.yaml, scripts/test_utilities.py, evals/fixtures/provider_model_check.py, evals/executions/JE-X011/artifacts/analysis.py, evals/executions/JE-X039, evals/executions/JE-X042, evals/executions/JE-X043]
    gap: "Dynamic programming, NFXP, exact-rational and boundary tests, invariant distributions, equilibrium recomputation, root traces, and isolated grid checks have reproducible runs. Data and measurement now have an integrated economic-object, linkage, sample-flow, transformation, and handoff protocol, but behavior on a real multi-source research dataset remains unproved. Alternative algorithms, parallel or hardware variation, and broader failure-region evidence also remain."
  data_and_measurement:
    status: partial
    evidence: [references/SITUATION_AND_FRONTIER.md, references/DATA_AND_MEASUREMENT.md, assets/templates/DATA_CONSTRUCTION_MAP.yaml, evals/cases.yaml]
    gap: "The runtime now routes variable definition, panel construction, joins, crosswalks, missingness, sample flow, and analysis-data handoff through a theory- and institution-aware protocol. Validate it once in a future substantive data project with real source keys and sample reconciliation; do not create a synthetic data-audit campaign solely for status promotion."
  writing_and_reading:
    status: proved
    evidence: [references/ECONOMIC_WRITING.md, references/PAPER_READING.md, references/BILINGUAL_ECONOMIC_WRITING.md, evals/executions/JE-X021, evals/executions/JE-X022, evals/executions/JE-X023, evals/executions/JE-X024]
    gap: "Real 69-page PDF and long-manuscript comparisons pass, and bilingual claim reconciliation is now integrated. Future substantive work should broaden theory-paper, structural-paper, bilingual, and public-explanation behavior without a separate format-only test campaign."
  mainline_claims_and_backtracking:
    status: proved
    evidence: [assets/templates/RESEARCH_MAINLINE.yaml, assets/templates/CLAIM_LEDGER.yaml, references/BRANCH_AND_DECISION_PROTOCOL.md, evals/executions/JE-X015]
    gap: "JE-X015 preserves three-round claim history, backtracks measurement, abandons an unsupported causal branch, and forks a bounded randomized margin; claim-status promotion before uncertainty was tightened after audit."
  principal_contradiction_and_bounded_verification:
    status: partial
    evidence: [SKILL.md, references/BRANCH_AND_DECISION_PROTOCOL.md, evals/runs/2026-07-13-round-17.md, evals/cases.yaml]
    gap: "A real long-running failure exposed verification-branch capture and produced explicit principal-contradiction, three-tier verification, and two-iteration stopping rules. The observed failure motivates the rule but does not prove corrected behavior; test it once inside a future substantive research task rather than launching a dedicated meta-verification campaign."
  cross_disciplinary_correction:
    status: partial
    evidence: [references/SOURCE_PROTOCOL.md, references/HUMAN_WELFARE_AND_INSTITUTIONS.md, references/INTERDISCIPLINARY_BRIDGES.md, assets/templates/INTERDISCIPLINARY_BRIDGE.yaml, evals/executions/JE-X013, evals/cases.yaml]
    gap: "Clinical and institutional evidence has changed agents, states, measurement, welfare, and claim status in a real execution. The runtime now adds a general jurisdiction-preserving bridge for legal, historical, sociological, psychological, spatial, computational, and environmental correction. General behavior remains unproved beyond health; let the next substantive non-health project test it rather than opening a standalone audit campaign."
  reproducible_behavior_evaluation:
    status: partial
    evidence: [evals/cases.yaml, evals/runs, evals/run_schema.yaml, evals/executions]
    gap: "Sixty strict executions now include automatic routing, real PDF, long manuscript, legacy comparisons, theory/frontier and Dao endpoints, micro and macro law families, structural demand-supply, dynamic choice, misspecification, profile sets, preserved failures, and clean exact-commit transfers through f120979; exact client/model provenance and platform-level telemetry remain unavailable."
  legacy_skill_replacement:
    status: partial
    evidence: [references/ECONOMIC_WRITING.md, references/PAPER_READING.md, references/BILINGUAL_ECONOMIC_WRITING.md, assets/templates/BILINGUAL_CLAIM_MAP.yaml, evals/legacy_capabilities.yaml, evals/executions/JE-X018, evals/executions/JE-X020, evals/executions/JE-X021, evals/executions/JE-X022, evals/executions/JE-X023, evals/executions/JE-X024]
    gap: "Conceptual reading, writing, claim governance, literature/style separation, citekey checking, prose review, and bilingual claim reconciliation are integrated. Coexistence remains appropriate because legacy baselines passed, integrated reading was not uniformly more accurate, writing gains were mainly governance, and convenience/formatting surfaces remain. Let future substantive paper work reveal remaining gaps instead of running a retirement-only test campaign."
  codex:
    status: proved
    evidence: [agents/openai.yaml, evals/executions/JE-X016, evals/executions/JE-X017, evals/executions/JE-X020]
    gap: "Fresh-context tests prove positive auto-invocation, negative restraint, and upstream-before-writing order; provenance is self-reported because dispatch telemetry is unavailable."
  claude_code:
    status: partial
    evidence: [evals/platform_compatibility.yaml, skills/junzi-economist/scripts/validate_compatibility.py]
    gap: "The package is installed at the official personal skill path with parity and current documentation confirms the layout; Claude Code itself is not installed or authenticated, so real discovery, invocation, non-trigger, routing, and backtracking runs remain."
  public_release:
    status: missing
    evidence: ["local repository release candidate with a separated runtime package"]
    gap: "Public remote, anonymous clone test, v0.1.0 tag, release date, and release checks."
release_gate:
  ready: false
  blockers:
    - real Claude Code runtime behavior
    - public remote and anonymous installation test
