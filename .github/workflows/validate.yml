name: Validate skill

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Validate package
        run: |
          python skills/junzi-economist/scripts/validate.py
          python skills/junzi-economist/scripts/validate_compatibility.py
          python scripts/test_utilities.py
          python scripts/validate_eval_records.py
          python evals/fixtures/provider_model_check.py
          python -m compileall -q skills/junzi-economist/scripts scripts
      - name: Build website
        working-directory: website
        run: |
          npm ci
          npm run build

  install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Test shell installer
        if: runner.os != 'Windows'
        shell: bash
        env:
          HOME: ${{ runner.temp }}/junzi-home
        run: |
          chmod +x install.sh
          ./install.sh
          python "$HOME/.codex/skills/junzi-economist/scripts/validate.py"
          python scripts/verify_install.py --source skills/junzi-economist --installed "$HOME/.codex/skills/junzi-economist"
          touch "$HOME/.codex/skills/junzi-economist/keep-marker"
          if ./install.sh 2>/dev/null; then exit 1; fi
          test -f "$HOME/.codex/skills/junzi-economist/keep-marker"
          ./install.sh --force
          test ! -f "$HOME/.codex/skills/junzi-economist/keep-marker"
      - name: Test PowerShell installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Root = Join-Path $env:RUNNER_TEMP 'junzi-home'
          .\install.ps1 -DestinationRoot $Root
          $Codex = Join-Path $Root '.codex\skills\junzi-economist'
          python "$Codex\scripts\validate.py"
          python .\scripts\verify_install.py --source .\skills\junzi-economist --installed $Codex
          Set-Content -LiteralPath "$Codex\keep-marker" -Value 'preserve'
          $Blocked = $false
          try { .\install.ps1 -DestinationRoot $Root } catch { $Blocked = $true }
          if (-not $Blocked -or -not (Test-Path -LiteralPath "$Codex\keep-marker")) { throw 'Overwrite protection failed' }
          .\install.ps1 -DestinationRoot $Root -Force
          if (Test-Path -LiteralPath "$Codex\keep-marker") { throw 'Force replacement failed' }
